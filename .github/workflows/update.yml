name: Update My EPG
on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 4 点运行
  workflow_dispatch:      # 允许你在 GitHub 页面手动点击运行

permissions:
  contents: write         # 允许脚本修改仓库内容

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Grab EPG
        # 在这里修改或添加你想要的站点，--output 指定保存的文件名
        run: npm run grab -- --sites=sky.com --output=guide.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guide.xml
          # 只有在文件有变化时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG $(date)" && git push)
